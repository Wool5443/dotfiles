source = ~/.config/hypr/apps.conf

exec-once = usmp app -- hyprswitch init --show-title --size-factor 5.5 --workspaces-per-row 5 &
exec-once = usmp app -- hyprpaper
# exec-once = ~/StartWallpaper.sh
# exec-once = hyprlux

exec-once = usmp app -- blueman-applet
exec-once = usmp app -- sway-audio-idle-inhibit
exec-once = usmp app -- udiskie
exec-once = usmp app -- albert

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = xhost +si:localuser:$USER

exec-once = [workspace 1 silent] usmp app -- $browser
exec-once = [workspace 2 silent] usmp app -- telegram-desktop
exec-once = [workspace 10 silent] usmp app -- spotify
exec-once = [workspace 11 silent] usmp app -- nekobox
